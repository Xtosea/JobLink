name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Node.js LTS (22.x) matching Capacitor requirements
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ Install frontend dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install Capacitor Android at the version in package.json
      - name: Install Capacitor Android
        run: npm install @capacitor/android@8.1.0

      # 5️⃣ Sync Capacitor with Android project
      - name: Sync Android
        run: npx cap sync android

      # 6️⃣ Set up Java 17 for Gradle
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 7️⃣ Decode Android keystore
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/joblink-release-key.jks

      # 8️⃣ Decode google-services.json
      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      # 9️⃣ Make Gradle wrapper executable
      - name: Make Gradle executable
        run: chmod +x gradlew
        working-directory: android

      # 🔟 Clean project
      - name: Clean project
        run: ./gradlew clean
        working-directory: android

      # 1️⃣1️⃣ Build release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: android

      # 1️⃣2️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: joblink-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk