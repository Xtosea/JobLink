name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js (required for Capacitor)
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3️⃣ Setup Java 17 (required for Gradle Android build)
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 4️⃣ Install npm dependencies
      - name: Install npm dependencies
        run: npm ci
        working-directory: .

      # 5️⃣ Decode keystore for signing
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/joblink-release-key.jks

      # 6️⃣ Decode google-services.json
      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      # 7️⃣ Sync Capacitor Android project
      - name: Capacitor sync Android
        run: npx cap sync android
        working-directory: .

      # 8️⃣ Make Gradle wrapper executable
      - name: Make Gradle executable
        run: chmod +x ./gradlew
        working-directory: android

      # 9️⃣ Clean previous builds
      - name: Clean project
        run: ./gradlew clean
        working-directory: android

      # 🔟 Build the release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: android

      # 1️⃣1️⃣ Upload the generated APK artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: joblink-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk