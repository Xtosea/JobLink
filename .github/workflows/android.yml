name: Build Signed Android APK

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node 22
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Install project dependencies
      - name: Install npm dependencies
        run: npm ci

      # 4️⃣ Ensure Capacitor Android is installed
      - name: Install Capacitor Android
        run: npm install @capacitor/android@5

      # 5️⃣ Build React frontend
      - name: Build React App
        run: npm run build

      # 6️⃣ Sync Capacitor
      - name: Capacitor Sync
        run: npx cap sync android

      # 7️⃣ Setup Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 8️⃣ Install Android SDK + Build Tools
      - name: Install Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # 9️⃣ Decode Keystore from Secrets
      - name: Decode Keystore
        run: |
          echo ${{ secrets.KEYSTORE_FILE }} | base64 --decode > android/joblink-release-key.jks

      # 🔟 Build signed APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=joblink-release-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 1️⃣1️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: joblink-apk
          path: android/app/build/outputs/apk/release/app-release.apk