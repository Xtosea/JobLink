name: Build Android APK

on:
  push:
    branches:
      - main  # or your default branch

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # Use your Node version

      # 3️⃣ Install Node modules
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Sync Capacitor Android
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 5️⃣ Set up JDK (for Gradle build)
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17  # Match your project JDK

      # 6️⃣ Build APK
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      # 7️⃣ Optional: upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: JobLink-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk