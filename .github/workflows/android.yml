name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Restore the Android keystore from secret
      - name: Restore keystore
        run: |
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/joblink-release-key.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      # 4️⃣ Restore google-services.json from secret
      - name: Restore Firebase config
        run: |
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      # 5️⃣ Make Gradle wrapper executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 6️⃣ Build release APK
      - name: Build Release APK
        working-directory: android
        run: ./gradlew clean assembleRelease

      # 7️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: joblink-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk