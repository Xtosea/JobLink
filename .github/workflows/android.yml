name: Build Android APK

on:
  push:
    branches:
      - main  # change if your default branch is different

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js (v22 required by Capacitor)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ Cache npm dependencies
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-cache-

      # 4️⃣ Install Node dependencies
      - name: Install dependencies
        run: npm ci

      # 5️⃣ Capacitor sync (ensures :capacitor-android exists)
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 6️⃣ Setup JDK for Gradle build
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      # 7️⃣ Cache Gradle dependencies
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
          key: gradle-cache-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-cache-

      # 8️⃣ Clean & build the release APK
      - name: Build Release APK
        working-directory: android
        run: ./gradlew clean assembleRelease --stacktrace

      # 9️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JobLink-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk