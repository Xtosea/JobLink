name: Build Signed Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: 22
      ANDROID_SDK_ROOT: /usr/local/android-sdk
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node 22+
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3️⃣ Setup Java (needed for Gradle)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 4️⃣ Install dependencies
      - name: Install npm dependencies
        run: npm ci

      # 5️⃣ Ensure Capacitor Android folder
      - name: Ensure Capacitor Android folder
        run: |
          if [ ! -d android/capacitor-android ]; then
            echo "capacitor-android folder missing — running npx cap update android..."
            npx cap update android
          else
            echo "capacitor-android folder exists"
          fi

      # 6️⃣ Fix settings.gradle
      - name: Fix settings.gradle for Capacitor
        run: |
          SETTINGS_FILE=android/settings.gradle
          CAP_MODULE="include ':capacitor-android'"
          CAP_PATH="project(':capacitor-android').projectDir = new File(rootDir, '../node_modules/@capacitor/android')"

          if ! grep -q "$CAP_MODULE" "$SETTINGS_FILE"; then
            echo "$CAP_MODULE" >> "$SETTINGS_FILE"
          fi

          if ! grep -q "project(':capacitor-android').projectDir" "$SETTINGS_FILE"; then
            echo "$CAP_PATH" >> "$SETTINGS_FILE"
          fi

          echo "settings.gradle updated to include capacitor-android"

      # 7️⃣ Build signed APK
      - name: Build signed APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=app/joblink-release-key.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD