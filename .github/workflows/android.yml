name: Build Signed Android APK

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Install npm dependencies
      - run: npm ci

      # 4️⃣ Ensure Capacitor Android platform exists
      - run: npx cap add android || echo "Android already exists"

      # 5️⃣ Sync Capacitor (important!)
      - run: npx cap sync android

      # 6️⃣ Build React frontend
      - run: npm run build

      # 7️⃣ Setup Java 17
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 8️⃣ Install Android SDK
      - run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # 9️⃣ Build signed APK
      - run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 🔟 Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: joblink-apk
          path: android/app/build/outputs/apk/release/app-release.apk