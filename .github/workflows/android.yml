name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # ✅ Use Node 22 (required by Capacitor CLI)
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    # ✅ Install dependencies with npm install (lock file mismatch safe)
    - name: Install npm dependencies
      run: npm install

    # ✅ Verify Firebase config exists (Google Services)
    - name: Decode Firebase JSON
      if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
      run: |
        mkdir -p android/app
        echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

    # ✅ Build Android release APK
    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean assembleRelease --stacktrace

    # ✅ Upload APK as artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JobLink-release-apk
        path: android/app/build/outputs/apk/release/app-release.apk