name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install npm dependencies
      run: npm install

    # ✅ Decode Firebase JSON inside the run script
    - name: Decode Firebase JSON
      run: |
        mkdir -p android/app
        if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
        else
          echo "No Firebase secret provided, skipping..."
        fi
      env:
        GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean assembleRelease --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JobLink-release-apk
        path: android/app/build/outputs/apk/release/app-release.apk