name: Build Signed Android APK with Capacitor Fix

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ Cache npm dependencies
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-cache-

      # 4️⃣ Install Node dependencies
      - name: Install dependencies
        run: npm ci

      # 5️⃣ Ensure Capacitor Android folder exists
      - name: Ensure Capacitor Android folder
        run: |
          if [ ! -d android/capacitor-android ]; then
            echo "capacitor-android folder missing — creating..."
            npx cap update android
          else
            echo "capacitor-android folder exists"
          fi

      # 6️⃣ Debug Capacitor folders
      - name: Debug Capacitor Android Folders
        run: |
          echo "Listing node_modules/@capacitor/android:"
          ls -l node_modules/@capacitor/android || echo "Missing node_modules/@capacitor/android"
          echo "Listing android/capacitor-android:"
          ls -l android/capacitor-android || echo "Missing android/capacitor-android"

      # 7️⃣ Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      # 8️⃣ Cache Gradle dependencies
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
          key: gradle-cache-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-cache-

      # 9️⃣ Prepare Keystore from secrets
      - name: Prepare Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/joblink-release-key.jks

      # 🔟 Build Release APK (signed)
      - name: Build Release APK
        working-directory: android
        run: >
          ./gradlew clean assembleRelease
          -Pandroid.injected.signing.store.file=app/joblink-release-key.jks
          -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}"
          -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}"
          -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
          --stacktrace

      # 1️⃣1️⃣ Upload signed APK
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: JobLink-signed-apk
          path: android/app/build/outputs/apk/release/app-release.apk