name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ Cache npm dependencies
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-cache-

      # 4️⃣ Install Node dependencies
      - name: Install dependencies
        run: npm ci

      # 5️⃣ Capacitor sync
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 6️⃣ Debug step: check Capacitor Android module
      - name: Debug: Capacitor Android folder
        run: |
          echo "Listing node_modules/@capacitor/android:"
          ls -l node_modules/@capacitor/android
          echo "Listing Android project variants:"
          cd android
          ./gradlew :app:tasks --all

      # 7️⃣ Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      # 8️⃣ Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
          key: gradle-cache-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-cache-

      # 9️⃣ Build Release APK
      - name: Build Release APK
        working-directory: android
        run: ./gradlew clean assembleRelease --stacktrace

      # 🔟 Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JobLink-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk