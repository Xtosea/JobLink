name: Build Signed Android APK

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js 22 (required for Capacitor 5)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Install project dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Sync Capacitor Android
      - name: Capacitor Sync
        run: npx cap sync android

      # 5️⃣ Setup Java 17 for Gradle
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 6️⃣ Install Android SDK 34 + build-tools
      - name: Install Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # 7️⃣ Build release APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease

      # 8️⃣ Upload generated APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: joblink-apk
          path: android/app/build/outputs/apk/release/app-release.apk