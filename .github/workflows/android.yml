name: Build Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # These values come from your GitHub Secrets
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Decode and save Keystore
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > android/app/joblink-release-key.jks

    - name: Decode and save google-services.json
      run: |
        echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

    - name: Build Release APK
      run: |
        cd android
        ./gradlew clean assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: JobLink-Release-APK
        path: android/app/build/outputs/apk/release/app-release.apk