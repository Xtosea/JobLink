name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js (v22 LTS)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ Install dependencies
      - name: Install npm dependencies
        run: npm ci

      # 4️⃣ Install Capacitor Android and sync
      - name: Install Capacitor Android & sync
        run: |
          npm install @capacitor/android@latest
          npx cap sync android

      # 5️⃣ Setup Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 6️⃣ Decode keystore
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/joblink-release-key.jks

      # 7️⃣ Decode google-services.json
      - name: Decode Google Services JSON
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      # 8️⃣ Make gradlew executable
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
        working-directory: android

      # 9️⃣ Clean project
      - name: Clean project
        run: ./gradlew clean
        working-directory: android

      # 🔟 Build Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: android

      # 1️⃣1️⃣ Upload APK Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: joblink-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk