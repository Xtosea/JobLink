name: Build Signed Android APK

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Install npm dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build React frontend
      - name: Build React
        run: npm run build

      # 5️⃣ Add Capacitor Android platform
      - name: Capacitor Sync
        run: npx cap sync android

      # 6️⃣ Setup Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 7️⃣ Install Android SDK + Build Tools
      - name: Install Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # 8️⃣ Decode keystore from GitHub secret
      - name: Setup Keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/joblink-release-key.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # 9️⃣ Build release APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 🔟 Upload signed APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: joblink-apk
          path: android/app/build/outputs/apk/release/app-release.apk