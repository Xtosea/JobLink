name: Build Android

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Node (required by Capacitor)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22  # Capacitor 8 requires Node >=22

      # 3️⃣ Install dependencies
      - name: Install npm packages
        run: npm install

      # 4️⃣ Decode google-services.json from secret
      - name: Setup google-services.json
        run: |
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json

      # 5️⃣ Verify google-services.json exists
      - name: Verify google-services.json
        run: |
          ls -la android/app
          head -n 10 android/app/google-services.json

      # 6️⃣ Build Android APK
      - name: Build release APK
        run: |
          cd android
          ./gradlew clean assembleRelease

      # 7️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JobLink-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk