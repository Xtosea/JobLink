name: Build Signed Android APK

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node 22
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ Install npm dependencies (use install to avoid lockfile issues)
      - name: Install npm dependencies
        run: npm install

      # 4️⃣ Build React frontend
      - name: Build React frontend
        run: npm run build

      # 5️⃣ Sync Capacitor Android
      - name: Capacitor Sync
        run: npx cap sync android

      # 6️⃣ Setup Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 7️⃣ Install Android SDK 34 + Build Tools
      - name: Install Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # 8️⃣ Build signed APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 9️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: joblink-apk
          path: android/app/build/outputs/apk/release/app-release.apk