name: Build Signed Android APK

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Setup Java & Android SDK
        uses: android-actions/setup-android@v2

      - name: Decode keystore
        run: |
          mkdir -p android
          echo "$KEYSTORE_BASE64" | base64 --decode > android/joblink-release-key.jks

      - name: Build Release APK
        run: |
          cd android
          chmod +x ./gradlew
          # Auto-increment versionCode using timestamp
          export VERSION_CODE=$(date +%s)
          export VERSION_NAME_SUFFIX=$(date +%Y%m%d%H%M)
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JobLink-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk